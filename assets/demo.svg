<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace">
  <style>
    .fade { opacity: 0; animation: fin 0.35s forwards; }
    @keyframes fin { to { opacity: 1 } }
    .t  { fill: #e6edf3; font-size: 13px; }
    .d  { fill: #8b949e; font-size: 13px; }
    .dd { fill: #6e7681; font-size: 13px; }
    .b  { font-weight: 600; }
    .prompt { fill: #d97757; font-size: 14px; font-weight: 700; }
    .bullet { fill: #d97757; font-size: 14px; }
    .ok     { fill: #3fb950; font-size: 12px; }
    .kw { fill: #ff7b72; }
    .fn { fill: #d2a8ff; }
    .st { fill: #a5d6ff; }
    .nu { fill: #79c0ff; }
    .ty { fill: #ffa657; }
    .cm { fill: #8b949e; font-style: italic; }
    .dec { fill: #7ee787; }
  </style>

  <rect width="900" height="520" rx="10" fill="#0d1117"/>

  <!-- top chrome: subtle header strip with cwd -->
  <text x="24" y="28" class="dd">~/projects/flyte-demo</text>
  <line x1="24" y1="40" x2="876" y2="40" stroke="#21262d"/>

  <!-- user prompt -->
  <g class="fade" style="animation-delay:.1s">
    <text x="24" y="76" class="prompt">&gt;</text>
    <text x="44" y="76" class="t">how do I cache a flyte v2 task and invalidate on input change?</text>
  </g>

  <!-- tool 1 -->
  <g class="fade" style="animation-delay:.9s">
    <text x="24" y="120" class="bullet">●</text>
    <text x="44" y="120" class="t b">flyte - get_flyte_symbol</text>
    <text x="215" y="120" class="t">(name: <tspan class="st">"Cache"</tspan>)</text>
    <text x="335" y="120" class="d">(MCP)</text>
    <text x="44" y="140" class="d">  ⎿  <tspan class="dd">class Cache — cache configuration: auto | override | manual (1 match)</tspan></text>
  </g>

  <!-- tool 2 -->
  <g class="fade" style="animation-delay:1.5s">
    <text x="24" y="178" class="bullet">●</text>
    <text x="44" y="178" class="t b">flyte - get_flyte_pattern</text>
    <text x="225" y="178" class="t">(theme: <tspan class="st">"caching"</tspan>)</text>
    <text x="360" y="178" class="d">(MCP)</text>
    <text x="44" y="198" class="d">  ⎿  <tspan class="dd">examples/caching/content_based_caching.py (73 lines)</tspan></text>
  </g>

  <!-- answer -->
  <g class="fade" style="animation-delay:2.1s">
    <text x="24" y="240" class="t">Put <tspan class="st">flyte.Cache</tspan> on the task decorator. Behavior <tspan class="st">"auto"</tspan> hashes the function</text>
    <text x="24" y="260" class="t">body and inputs — re-runs fire only when the hash changes.</text>
  </g>

  <!-- code block -->
  <g class="fade" style="animation-delay:2.6s">
    <rect x="24" y="284" width="852" height="196" rx="8" fill="#161b22" stroke="#21262d"/>
    <text x="40" y="306" class="t"><tspan class="kw">import</tspan> flyte</text>
    <text x="40" y="326" class="t">env = flyte.TaskEnvironment(name=<tspan class="st">"trainer"</tspan>)</text>
    <text x="40" y="358" class="t"><tspan class="dec">@env.task</tspan>(</text>
    <text x="56" y="378" class="t">cache=flyte.Cache(behavior=<tspan class="st">"auto"</tspan>, serialize=<tspan class="nu">True</tspan>),</text>
    <text x="40" y="398" class="t">)</text>
    <text x="40" y="418" class="t"><tspan class="kw">async def</tspan> <tspan class="fn">train</tspan>(epochs: <tspan class="ty">int</tspan>) -&gt; <tspan class="ty">dict</tspan>:</text>
    <text x="56" y="438" class="cm"># cache invalidates on epochs change or source edit</text>
    <text x="56" y="458" class="t"><tspan class="kw">return</tspan> {<tspan class="st">"ok"</tspan>: <tspan class="nu">True</tspan>}</text>
  </g>

  <!-- next prompt blink -->
  <text x="24" y="504" class="prompt">&gt;</text>
  <rect x="42" y="492" width="8" height="15" fill="#e6edf3">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.51;1" dur="1s" begin="3.2s" repeatCount="indefinite"/>
  </rect>
</svg>
