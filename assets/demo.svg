<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 500" width="820" height="500" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f0f0f"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
  </defs>

  <rect width="820" height="500" rx="10" fill="url(#bg)"/>

  <!-- prompt line -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.2s" fill="freeze"/>
    <text x="24" y="42" fill="#d97757" font-size="14" font-weight="700">&gt;</text>
    <text x="44" y="42" fill="#e5e5e5" font-size="14">how do I cache a flyte v2 task and invalidate on input change?</text>
  </g>

  <!-- tool call 1 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.2s" fill="freeze"/>
    <text x="24" y="82" fill="#b48eff" font-size="14">●</text>
    <text x="44" y="82" fill="#e5e5e5" font-size="14" font-weight="600">flyte - get_flyte_symbol <tspan fill="#8a8a8a" font-weight="400">(MCP)</tspan></text>
    <text x="44" y="100" fill="#8a8a8a" font-size="13">  name: "Cache"</text>
    <text x="44" y="120" fill="#6c6c6c" font-size="13">⎿ <tspan fill="#a0a0a0">class Cache — cache configuration with auto/override/manual behavior</tspan></text>
  </g>

  <!-- tool call 2 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.0s" fill="freeze"/>
    <text x="24" y="158" fill="#b48eff" font-size="14">●</text>
    <text x="44" y="158" fill="#e5e5e5" font-size="14" font-weight="600">flyte - get_flyte_pattern <tspan fill="#8a8a8a" font-weight="400">(MCP)</tspan></text>
    <text x="44" y="176" fill="#8a8a8a" font-size="13">  theme: "caching"</text>
    <text x="44" y="196" fill="#6c6c6c" font-size="13">⎿ <tspan fill="#a0a0a0">examples/caching/content_based_caching.py</tspan></text>
  </g>

  <!-- answer text -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.8s" fill="freeze"/>
    <text x="24" y="238" fill="#e5e5e5" font-size="14">Use <tspan fill="#d97757">flyte.Cache</tspan> on the task decorator. Behavior <tspan fill="#d97757">"auto"</tspan> hashes inputs</text>
    <text x="24" y="258" fill="#e5e5e5" font-size="14">automatically, so re-runs only when the signature or arguments change.</text>
  </g>

  <!-- code block -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.3s" fill="freeze"/>
    <rect x="24" y="280" width="760" height="180" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="36" y="304" fill="#ff7b72" font-size="13">import</text>
    <text x="86" y="304" fill="#e5e5e5" font-size="13">flyte</text>

    <text x="36" y="326" fill="#e5e5e5" font-size="13">env = flyte.TaskEnvironment(name=<tspan fill="#a5d6ff">"trainer"</tspan>)</text>

    <text x="36" y="362" fill="#7ee787" font-size="13">@env.task(</text>
    <text x="52" y="380" fill="#e5e5e5" font-size="13">cache=flyte.Cache(behavior=<tspan fill="#a5d6ff">"auto"</tspan>, serialize=<tspan fill="#79c0ff">True</tspan>),</text>
    <text x="36" y="398" fill="#7ee787" font-size="13">)</text>

    <text x="36" y="418" fill="#ff7b72" font-size="13">async def</text>
    <text x="106" y="418" fill="#d2a8ff" font-size="13">train</text>
    <text x="144" y="418" fill="#e5e5e5" font-size="13">(epochs: <tspan fill="#ffa657">int</tspan>) -&gt; <tspan fill="#ffa657">dict</tspan>:</text>

    <text x="52" y="438" fill="#8a8a8a" font-size="13" font-style="italic"># cached by (epochs); re-runs only when the value changes</text>
  </g>

  <!-- prompt cursor blink -->
  <g>
    <text x="24" y="488" fill="#d97757" font-size="14" font-weight="700">&gt;</text>
    <rect x="42" y="476" width="8" height="16" fill="#e5e5e5">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.5;0.99;1" dur="1s" begin="4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
